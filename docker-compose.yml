services:
  mongo:
    image: mongo:7
    container_name: ekolite-mongo
    ports:
      - '27017:27017'
    command: ['--replSet', 'rs0']
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: 'no'
    entrypoint:
      [
        'mongosh',
        '--host',
        'mongo',
        '--eval',
        "try { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }) } catch(e) { if (e.codeName !== 'AlreadyInitialized') throw e }",
      ]

volumes:
  mongo-data:
